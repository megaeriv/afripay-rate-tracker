name: AfriPay Rate Tracker

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Write Google service account key from secret
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

- name: Decide run type (robust to GitHub cron delays)
        id: slot
        run: |
          NOW_MIN=$(( 10#$(date -u +%H) * 60 + 10#$(date -u +%M) ))
          M_DIFF=$(( NOW_MIN>480 ? NOW_MIN-480 : 480-NOW_MIN ))
          A_DIFF=$(( NOW_MIN>780 ? NOW_MIN-780 : 780-NOW_MIN ))
          C_DIFF=$(( NOW_MIN>960 ? NOW_MIN-960 : 960-NOW_MIN ))
          TYPE=morning; BEST=$M_DIFF
          if [ "$A_DIFF" -lt "$BEST" ]; then BEST=$A_DIFF; TYPE=afternoon; fi
          if [ "$C_DIFF" -lt "$BEST" ]; then BEST=$C_DIFF; TYPE=closing; fi
          echo "UTC minutes: $NOW_MIN -> slot: $TYPE"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Run the tracker
        run: python main.py ${{ steps.slot.outputs.type }}
