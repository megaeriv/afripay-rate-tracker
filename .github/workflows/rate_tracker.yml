name: AfriPay Rate Tracker

on:
  workflow_dispatch:
    inputs:
      slot_override:
        description: "Force a slot for testing (use 'auto' for normal scheduled behaviour)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - afternoon
          - closing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Decide run type
        id: slot
        run: |
          OVERRIDE="${{ github.event.inputs.slot_override }}"
          if [ -n "$OVERRIDE" ] && [ "$OVERRIDE" != "auto" ]; then
            echo "type=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOW_MIN=$(( 10#$(date -u +%H) * 60 + 10#$(date -u +%M) ))
          M_DIFF=$(( NOW_MIN > 480 ? NOW_MIN - 480 : 480 - NOW_MIN ))
          A_DIFF=$(( NOW_MIN > 780 ? NOW_MIN - 780 : 780 - NOW_MIN ))
          C_DIFF=$(( NOW_MIN > 960 ? NOW_MIN - 960 : 960 - NOW_MIN ))
          TYPE=morning; BEST=$M_DIFF
          if [ "$A_DIFF" -lt "$BEST" ]; then BEST=$A_DIFF; TYPE=afternoon; fi
          if [ "$C_DIFF" -lt "$BEST" ]; then BEST=$C_DIFF; TYPE=closing; fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Run the tracker
        run: python main.py ${{ steps.slot.outputs.type }}
